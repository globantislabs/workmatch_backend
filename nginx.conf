server {
    listen 80;
    server_name admin.theworkmatch.com;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name admin.theworkmatch.com;

    # SSL certificates (update paths to your certificates)
    ssl_certificate /etc/ssl/certs/theworkmatch.crt;
    ssl_certificate_key /etc/ssl/private/theworkmatch.key;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Client max body size for file uploads
    client_max_body_size 10M;

    # Proxy PocketBase files directly (blogs banners, CV uploads, etc.)
    location ^~ /api/files/ {
        proxy_pass http://localhost:8090/api/files/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Proxy settings
    location / {
        # Serve static files directly from frontend, fallback to FastAPI for /api
        root /var/www/workmatch_frontend;
        try_files $uri $uri.html $uri/ @fastapi;
    }

    # Clean URL rewrites
    location /career-detail/ {
        rewrite ^/career-detail/(.*)$ /career-details.html?name=$1 last;
    }
    
    # Generic rule for other .html files
    location ~ ^/([a-zA-Z0-9_-]+)$ {
        try_files $1.html =404;
    }

    location @fastapi {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (if needed)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Static files caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://localhost:8000;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Access and error logs
    access_log /var/log/nginx/workmatch_access.log;
    error_log /var/log/nginx/workmatch_error.log;
}
