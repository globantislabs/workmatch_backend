<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in to Work Match</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
      background: #f6f8fa;
      color: #24292f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    
    .login-container {
      width: 100%;
      max-width: 340px;
    }
    
    .logo-container {
      text-align: center;
      margin-bottom: 24px;
    }
    
    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
    }
    
    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    
    .form-container {
      background: #ffffff;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      padding: 20px;
    }
    
    .form-title {
      font-size: 24px;
      font-weight: 300;
      letter-spacing: -0.5px;
      text-align: center;
      margin-bottom: 16px;
      color: #24292f;
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #24292f;
    }
    
    input {
      width: 100%;
      padding: 5px 12px;
      font-size: 14px;
      line-height: 20px;
      color: #24292f;
      background: #ffffff;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      outline: none;
      transition: all 0.15s ease;
      height: 32px;
    }
    
    input:focus {
      border-color: #0969da;
      box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.3);
    }
    
    input::placeholder {
      color: #6e7781;
    }
    
    .btn {
      width: 100%;
      padding: 5px 16px;
      font-size: 14px;
      font-weight: 500;
      line-height: 20px;
      color: #ffffff;
      background: #1f883d;
      border: 1px solid rgba(31, 35, 40, 0.15);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s ease;
      height: 32px;
      margin-top: 16px;
    }
    
    .btn:hover {
      background: #1a7f37;
    }
    
    .btn:active {
      background: #1a7f37;
      box-shadow: inset 0 1px 0 rgba(0, 0, 0, 0.15);
    }
    
    .btn:disabled {
      background: #94d3a2;
      border-color: rgba(31, 35, 40, 0.15);
      color: rgba(255, 255, 255, 0.8);
      cursor: not-allowed;
    }
    
    .error {
      background: #ff8182;
      color: #24292f;
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
      border: 1px solid rgba(31, 35, 40, 0.15);
    }
    
    .footer {
      margin-top: 24px;
      text-align: center;
    }
    
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    
    .footer-link {
      color: #0969da;
      text-decoration: none;
      font-size: 12px;
      transition: color 0.15s ease;
    }
    
    .footer-link:hover {
      text-decoration: underline;
    }
    
    .copyright {
      color: #57606a;
      font-size: 12px;
    }
    
    @media (max-width: 480px) {
      .form-container {
        padding: 16px;
      }
      
      .form-title {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo-container">
      <div class="logo">
        <img src="https://theworkmatch.com/img/WorkMatch_Logo.png" alt="Work Match">
      </div>
    </div>
    
    <div class="form-container">
      <h1 class="form-title">Sign in to Work Match</h1>
      
      <div class="error" id="error"></div>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input 
            type="text" 
            id="username" 
            name="username" 
            autocomplete="username"
            autofocus
            required
          >
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password"
            autocomplete="current-password"
            required
          >
        </div>
        
        <button type="submit" class="btn">Sign in</button>
      </form>
    </div>
    
    <div class="footer">
      <div class="footer-links">
        <a href="https://theworkmatch.com" class="footer-link">Terms</a>
        <a href="https://theworkmatch.com" class="footer-link">Privacy</a>
        <a href="https://theworkmatch.com" class="footer-link">Contact</a>
      </div>
      <div class="copyright">
        © 2024 Work Match. All rights reserved.
      </div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const formData = new FormData(e.target);
      const errorDiv = document.getElementById('error');
      const submitBtn = e.target.querySelector('button');
      
      submitBtn.textContent = 'Signing in...';
      submitBtn.disabled = true;
      errorDiv.style.display = 'none';
      
      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          body: formData
        });

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem('token', data.token);
          window.location.href = '/admin';
        } else {
          errorDiv.textContent = data.detail || 'Incorrect username or password.';
          errorDiv.style.display = 'block';
        }
      } catch (error) {
        errorDiv.textContent = 'Unable to sign in. Please try again.';
        errorDiv.style.display = 'block';
      } finally {
        submitBtn.textContent = 'Sign in';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
