<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Work Match</title>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Karla:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Karla', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      position: relative;
      overflow: hidden;
    }
    
    body::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      border-radius: 50%;
      animation: float 15s ease-in-out infinite;
    }
    
    body::after {
      content: '';
      position: absolute;
      bottom: -30%;
      left: -10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
      border-radius: 50%;
      animation: float 20s ease-in-out infinite reverse;
    }
    
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(20px, 20px) scale(1.05); }
    }
    
    .container {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      animation: slideUp 0.6s ease-out;
    }
    
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .logo-container {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .logo {
      width: 70px;
      height: 70px;
      margin: 0 auto 1rem;
      background: white;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    
    .logo img {
      width: 50px;
      height: 50px;
      object-fit: contain;
    }
    
    .logo-text {
      font-family: 'Crimson Pro', serif;
      font-size: 1.75rem;
      font-weight: 700;
      color: white;
      text-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    
    .card {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.3);
    }
    
    .card-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .card-header h1 {
      font-family: 'Crimson Pro', serif;
      font-size: 1.75rem;
      font-weight: 700;
      color: #2d3748;
      margin-bottom: 0.5rem;
    }
    
    .card-header p {
      color: #718096;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 0.5rem;
      letter-spacing: 0.02em;
    }
    
    input {
      width: 100%;
      padding: 0.875rem 1rem;
      font-size: 0.95rem;
      font-family: 'Karla', sans-serif;
      color: #2d3748;
      background: white;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      transition: all 0.2s ease;
    }
    
    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .btn {
      width: 100%;
      padding: 1rem;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'Karla', sans-serif;
      color: white;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
      letter-spacing: 0.03em;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
    }
    
    .btn:active {
      transform: translateY(0);
    }
    
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .message {
      padding: 1rem;
      margin-bottom: 1.5rem;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 500;
      display: none;
      animation: slideDown 0.3s ease;
    }
    
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .success {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #10b981;
    }
    
    .error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #f87171;
    }
    
    .back-link {
      text-align: center;
      margin-top: 1.5rem;
    }
    
    .back-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    
    .back-link a:hover {
      color: #764ba2;
      text-decoration: underline;
    }
    
    @media (max-width: 480px) {
      .card { padding: 2rem 1.5rem; }
      .card-header h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <div class="logo">
        <img src="https://theworkmatch.com/img/WorkMatch_Logo.png" alt="Work Match">
      </div>
      <div class="logo-text">Work Match</div>
    </div>
    
    <div class="card">
      <div class="card-header">
        <h1>Reset Your Password</h1>
        <p>Enter your email address and we'll send you a link to reset your password</p>
      </div>
      
      <div id="message" class="message"></div>
      
      <form id="resetForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="admin@workmatch.com"
            required
            autofocus
          >
        </div>
        
        <button type="submit" class="btn">Send Reset Link</button>
      </form>
      
      <div class="back-link">
        <a href="/admin/login">← Back to Sign In</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const formData = new FormData(e.target);
      const messageDiv = document.getElementById('message');
      const submitBtn = e.target.querySelector('button');
      
      submitBtn.textContent = 'Sending...';
      submitBtn.disabled = true;
      messageDiv.style.display = 'none';
      
      try {
        const response = await fetch('/api/auth/request-password-reset', {
          method: 'POST',
          body: formData
        });

        const data = await response.json();

        messageDiv.className = 'message success';
        messageDiv.textContent = '✓ ' + data.message;
        messageDiv.style.display = 'block';
        e.target.reset();
      } catch (error) {
        messageDiv.className = 'message error';
        messageDiv.textContent = '✗ Failed to send reset link. Please try again.';
        messageDiv.style.display = 'block';
      } finally {
        submitBtn.textContent = 'Send Reset Link';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
